<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>wombat.rendering.experimental — heap demo</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #111; font-family: system-ui, sans-serif; color: #ddd;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      body { display: grid; grid-template-rows: auto 1fr; }
      header { padding: 12px 16px; border-bottom: 1px solid #333; }
      header h1 { margin: 0; font-size: 14px; font-weight: 500; }
      header span { color: #888; }
      #app { position: relative; display: grid; place-items: center; }
      #app canvas { width: 100%; height: 100%; background: #000; display: block; }
      #status {
        position: absolute; left: 12px; bottom: 12px;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid #333; border-radius: 6px;
        font-size: 12.5px; color: #e8e8e8;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        white-space: pre; line-height: 1.45;
        pointer-events: none;
        backdrop-filter: blur(6px);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>wombat.rendering.experimental — <span>heap demo</span> &nbsp; (no scene graph)</h1>
    </header>
    <div id="app">
      <canvas id="cv"></canvas>
      <div id="status">initialising…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
