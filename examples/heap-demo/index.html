<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>wombat.rendering.experimental — heap demo</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #111; font-family: system-ui, sans-serif; color: #ddd;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      body { display: grid; grid-template-rows: auto 1fr auto; }
      header { padding: 12px 16px; border-bottom: 1px solid #333; }
      header h1 { margin: 0; font-size: 14px; font-weight: 500; }
      header span { color: #888; }
      #app { display: grid; place-items: center; }
      #app canvas { width: 100%; height: 100%; background: #000; display: block; }
      #status { padding: 12px 16px; border-top: 1px solid #333; font-size: 12px; color: #888; }
    </style>
  </head>
  <body>
    <header>
      <h1>wombat.rendering.experimental — <span>heap demo</span> &nbsp; (no scene graph)</h1>
    </header>
    <div id="app"><canvas id="cv"></canvas></div>
    <div id="status">initialising…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
